<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Picture / image frame -->
  <rect x="10" y="16" width="36" height="28" rx="4" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Mountain landscape inside frame -->
  <polyline points="10,36 20,26 28,33 34,27 46,36" stroke="white" stroke-width="2" stroke-linejoin="round" fill="none"/>
  <!-- Sun dot -->
  <circle cx="38" cy="23" r="3" fill="white"/>

  <!-- Magic wand -->
  <line x1="37" y1="44" x2="52" y2="57" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sparkle star at wand tip (top-left of wand) -->
  <g transform="translate(34,40)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle dots -->
  <circle cx="54" cy="14" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="58" cy="22" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="50" cy="10" r="1.5" fill="white" opacity="0.6"/>
</svg>
